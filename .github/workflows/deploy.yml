name: VYBE Continuous Integration & Build Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: './vybe_frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd vybe_frontend
          npm ci

      - name: Build Next.js app
        run: |
          cd vybe_frontend
          npm run build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: './vybe_backend/requirements.txt'

      - name: Install dependencies
        run: |
          cd vybe_backend
          pip install -r requirements.txt

      - name: Check Django configuration syntax
        run: |
          cd vybe_backend
          python -m py_compile vybe_backend/settings.py
