version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vybe_postgres
    restart: always
    environment:
      POSTGRES_DB: vybe
      POSTGRES_USER: vybe_user
      POSTGRES_PASSWORD: vybe_secure_password_99
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: vybe_redis
    restart: always
    expose:
      - "6379"

  backend:
    build: ./vybe_backend
    container_name: vybe_backend
    restart: always
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=vybe
      - DB_USER=vybe_user
      - DB_PASSWORD=vybe_secure_password_99
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    expose:
      - "8000"

  frontend:
    build: ./vybe_frontend
    container_name: vybe_frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=https://localhost/api
      - NEXT_PUBLIC_SOCKET_URL=https://localhost
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: vybe_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
