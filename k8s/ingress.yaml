apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vybe-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "vybe-backend"
spec:
  ingressClassName: nginx
  rules:
  - host: vybe.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: vybe-backend
            port:
              number: 8000
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: vybe-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vybe-frontend
            port:
              number: 3000
