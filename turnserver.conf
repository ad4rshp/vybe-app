# Coturn configuration file for WebRTC STUN/TURN services
listening-port=3478
tls-listening-port=5349

# Listening IP addresses
# listening-ip=0.0.0.0

# User credentials setup (Long-term credential mechanism)
lt-cred-mech
user=vybe_user:vybe_turn_password_99

# Realm setting (corresponds to site domain name)
realm=vybe.chat

# Logging config
verbose
fingerprint
simple-log
